apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: helpdeskflow
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: helpdeskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mailpit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailpit
        app.kubernetes.io/part-of: helpdeskflow
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:v1.27
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
            - name: web
              containerPort: 8025
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: helpdeskflow
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: helpdeskflow
spec:
  selector:
    app.kubernetes.io/name: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
    - name: web
      port: 8025
      targetPort: web
  type: ClusterIP
