apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: helpdeskflow
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: helpdeskflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/part-of: helpdeskflow
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: notification-service
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z helpdeskflow-db 5432; do echo waiting for db; sleep 2; done
      containers:
        - name: notification-service
          image: rafals12390/helpdeskflow-notification-service:v0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4004
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helpdeskflow-secrets
                  key: DB_PASSWORD
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: helpdeskflow-secrets
                  key: INTERNAL_SERVICE_TOKEN
            - name: NOTIFICATION_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: NOTIFICATION_SERVICE_PORT
            - name: NOTIFICATION_MODE
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: NOTIFICATION_MODE
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: SMTP_PORT
            - name: SMTP_SECURE
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: SMTP_SECURE
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: helpdeskflow-config
                  key: SMTP_FROM
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: helpdeskflow-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: helpdeskflow-secrets
                  key: SMTP_PASS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: helpdeskflow
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: helpdeskflow
spec:
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - name: http
      port: 4004
      targetPort: http
  type: ClusterIP
